spring.application.name=sample-login
spring.threads.virtual.enabled=true

# these don't really matter because of DCR, but are needed anyway
spring.security.oauth2.authorizationserver.client.default-client.token.access-token-time-to-live=365d
spring.security.oauth2.authorizationserver.client.default-client.registration.client-id=default-client
spring.security.oauth2.authorizationserver.client.default-client.registration.client-secret={noop}default-secret
spring.security.oauth2.authorizationserver.client.default-client.registration.client-authentication-methods[0]=none
spring.security.oauth2.authorizationserver.client.default-client.registration.authorization-grant-types[0]=authorization_code
spring.security.oauth2.authorizationserver.client.default-client.registration.redirect-uris[0]=/login/oauth2/code/authserver

# this is needed when running behind a reverse proxy
#server.forward-headers-strategy=framework

server.port=${PORT:9000}
server.servlet.session.cookie.name=MCP_AUTHORIZATION_SERVER_SESSIONID

gg.jte.usePrecompiledTemplates=true
